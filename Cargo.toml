[workspace]
members = ["keleusma-macros", "keleusma-arena"]

[package]
name = "keleusma"
version = "0.1.0"
edition = "2024"
description = "Keleusma: a Total Functional Stream Processor that compiles to bytecode"
license = "0BSD"
keywords = ["scripting", "bytecode", "no-std", "language", "vm"]
categories = ["no-std", "compilers"]

[dependencies]
libm = "0.2"
keleusma-macros = { path = "keleusma-macros", version = "0.1.0" }
keleusma-arena = { version = "0.1", features = ["alloc"] }
allocator-api2 = { version = "0.4", default-features = false, features = ["alloc"] }
rkyv = { version = "0.8", default-features = false, features = ["alloc", "bytecheck"] }
